<!-- Use BR and HR tags to display a piece of text with line breaks -->
 <!DOCTYPE html>
 <html>
 <head>
     <title>Linebreaks</title>
 </head>
 <body>
    <h1>Using Line Break BR</h1>
    This is first line <br> This is second line
    <h1>Using Horizontal Ruler HR</h1>
    This is first line<hr>This is second line
 </body>
 </html>
