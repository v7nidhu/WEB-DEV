<html>

<body>

                <th>S.No.</th>
                <th>Player Name</th>
                <th colspan="2">Max Score</th>

            </tr>
            <tr>
                <td>2</td>

            </tr>
            <tr>
                <td>3</td>
                <td>Sahil</td>
                <td>25</td>
                <td>Tennis</td>
            </tr>
            <tr>
                <td>4</td>

            </tr>
            </tbody>
        </table>

</html>
