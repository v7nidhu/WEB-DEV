<!--Create a table displaying score of cricket players in a match using HTML -->
<!DOCTYPE html>
<html>
<head>
    <title>Scorecard</title>
</head>
<body>
    <h1 align=" center"><i><u>Scorecard</u></i></h1>
    <table align="center" border="2" style="border-color: black;" width = "600">
        <tr>
            <th width = "120">Player Name</th>
            <th width = "120">Runs</th>
            <th width = "120">Balls</th>
            <th width = "120">4s</th>
            <th width = "120">6s</th>
            <th width = "120">Strike Rate</th>
        </tr>
        <tr>
            <td>Virat Kohli</td>
            <td>78</td>
            <td>52</td>
            <td>8</td>
            <td>2</td>
            <td>150.00</td>
        </tr>
        <tr>
            <td>Rohit Sharma</td>
            <td>65</td>
            <td>40</td>
            <td>7</td>
            <td>3</td>
            <td>162.50</td>
        </tr>
        <tr>
            <td>Shubman Gill</td>
            <td>42</td>
            <td>31</td>
            <td>5</td>
            <td>1</td>
            <td>135.48</td>
        </tr>
        <tr>
            <td>KL Rahul</td>
            <td>55</td>
            <td>45</td>
            <td>4</td>
            <td>2</td>
            <td>122.22</td>
        </tr>
        <tr>
            <td>Surya Kumar Yadav</td>
            <td>88</td>
            <td>47</td>
            <td>9</td>
            <td>5</td>
            <td>187.23</td>
        </tr>
    </table>
</body>
</html>
