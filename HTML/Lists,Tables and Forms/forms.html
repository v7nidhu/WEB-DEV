<!DOCTYPE html>
<html>

<head>
    <title>Forms</title>
</head>

<body>
    <div>
        <h3>Trip Travel Form</h3>
        <form>
            <!--TEXT INPUT-->
            <input type="text" placeholder="Enter your Name"><br>
            <!--RADIO INPUT-->
            Select your Section: <br>
            <label for="SectionidA">
                <input type="radio" value="Section A" name="Section" id="SectionidA"> Section A</label>
            <label for="SectionidB">
                <input type="radio" value="Section B" name="Section" id="SectionidB"> Section B</label>
            <label for="SectionidC">
                <input type="radio" value="Section C" name="Section" id="SectionidC"> Section C</label><br>
            <!--CHECKBOX INPUT-->
            Select what you want: <br>
            <input type="checkbox" id="foodcanteen" class="red" name="Canteen">
            <label for="foodcanteen">Food Canteen Card</label><br>
            <!--TEXT AREA INPUT-->
            <textarea name="Explain" id="explain" cols="30" rows="10" placeholder="Explain why you want to join"></textarea><br>
            <!--SELECT INPUT-->
            Select your Car:
            <select name="car" id="car">
                <option value="BMW">BMW</option>
                <option value="HYUNDAI">HYUNDAI</option>
                <option value="FORTUNER">FORTUNER</option>
                <option value="FORD">FORD</option>
                <option value="MERCEDES">MERCEDES</option>
                <option value="ROLLS ROYCE">ROLLS ROYCE</option>
                <option value="THAR">THAR</option>
            </select>
        </form>
    </div>
</body>

</html>
