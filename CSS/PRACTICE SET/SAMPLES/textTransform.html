<!DOCTYPE html>
<html>
<head>
    <title>Text Transform</title>
</head>
<style>
    .u {
        text-transform: uppercase;
    }
    .l {
        text-transform: lowercase;
    }
    .c {
        text-transform: capitalize;
    }
    .f {
        text-transform: full-width;
    }
</style>
<body>
<div class="u">
    This is Uppercase
</div>
<div class="l">
    This is Lowercase
</div>
<div class="c">
    This is Capitalize
</div>
<div class="f">
    This is Full-width
</div>
</body>
</html>
