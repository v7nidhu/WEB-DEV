<!DOCTYPE html>
<html>

<head>
    <title>Text Properties</title>
    <style>
        .linex {
            text-decoration: underline;
            text-decoration-color: red;
        }
        .line2 {
            text-decoration: underline dotted;
            text-decoration-color: rgb(255, 0, 0);
        }

        .line1 {
            text-decoration: overline;
            text-decoration-color: blue;
        }

        .line3 {
            text-decoration: line-through;
            text-decoration-color: green;
        }

        .line4 {
            text-decoration: underline overline;
            text-decoration-color: rgb(255, 145, 2);
        }

        .line5 {
           text-decoration: rgb(255, 7, 193) wavy underline;
        }
    </style>
</head>

<body>
    <p>
        <span class="line1">This is Overline</span><br>
        <span class="linex">This is Underline</span><br>
        <span class="line2">This is Dotted-Underline</span><br>
        <span class="line3">This is Line-through</span><br>
        <span class="line4">This is Underline and Overline</span><br>
        <span class="line5">This is Wavy Underline</span>
    </p>
</body>

</html>
